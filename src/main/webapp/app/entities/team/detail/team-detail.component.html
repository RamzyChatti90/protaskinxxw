<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (team(); as teamRef) {
      <div>
        <h2 data-cy="teamDetailsHeading"><span jhiTranslate="protaskinxxwApp.team.detail.title">Team</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ teamRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="protaskinxxwApp.team.name">Name</span></dt>
          <dd>
            <span>{{ teamRef.name }}</span>
          </dd>
          <dt><span jhiTranslate="protaskinxxwApp.team.description">Description</span></dt>
          <dd>
            <span>{{ teamRef.description }}</span>
          </dd>
          <dt><span jhiTranslate="protaskinxxwApp.team.startDate">Start Date</span></dt>
          <dd>
            <span>{{ teamRef.startDate | formatMediumDate }}</span>
          </dd>
          <dt><span jhiTranslate="protaskinxxwApp.team.createdAt">Created At</span></dt>
          <dd>
            <span>{{ teamRef.createdAt | formatMediumDatetime }}</span>
          </dd>
          <dt><span jhiTranslate="protaskinxxwApp.team.owner">Owner</span></dt>
          <dd>
            @if (team()!.owner) {
              <div>
                <a [routerLink]="['/app-user', team()!.owner?.id, 'view']">{{ teamRef.owner?.id }}</a>
              </div>
            }
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span jhiTranslate="entity.action.back">Retour</span>
        </button>

        <button type="button" [routerLink]="['/team', teamRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span jhiTranslate="entity.action.edit">Editer</span>
        </button>
      </div>
    }
  </div>
</div>
